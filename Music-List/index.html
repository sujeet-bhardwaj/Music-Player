<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
     <div class="container-fluid" style="height: 100vh;">
              <div class="row h-100 align-items-center">
                <div class="col-sm-9 col-md-4 col-lg-3 mx-auto">
                  <div class="card p-4">
                      <div class="d-flex justify-content-between mb-2">

  <!-- LEFT BUTTON -->
  <button class="btn bg-secondary " 
    type="button" 
    data-bs-toggle="offcanvas" 
    data-bs-target="#leftCanvas"
    onclick="showList()">
    <i class="fa-solid fa-list"></i> List of song
  </button>

  <!-- RIGHT BUTTON -->
  <button class="btn bg-secondary" 
    type="button" 
    data-bs-toggle="offcanvas" 
    data-bs-target="#rightCanvas"
    onclick="wishshowList()">
    <i class="fa-solid fa-list"></i>WishList
  </button>
<div class="offcanvas offcanvas-start" 
  tabindex="-1" 
  id="leftCanvas">
  <div class="offcanvas-header">
    <h5>Music List</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>

  <div class="offcanvas-body">
    <ul class="listitems"></ul>
  </div>
</div>
<div class="offcanvas offcanvas-end" 
  tabindex="-1" 
  id="rightCanvas">

  <div class="offcanvas-header">
    <h5>Wish List</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>

  <div class="offcanvas-body">
    <ul class="listitems-right"></ul>
  </div>
</div>
</div>
                    <div class="text-center">
                       <img src="" alt="" class="rounded-4" id="album" height="130px">
                    </div>
                  <audio src="" id="audio"></audio>
                  <div class="text-center mt-4">
                    <h5 id="title" class="text-white"></h5>
                    <h6 id="singer" class="text-white"></h6>  
                    <h3 class="w-100 d-flex justify-content-around"><small id="initial" class="text-white"></small> <small id="final"  class="text-white"></small></h3> 
                    <input type="range" id="progress" class="w-75 " value="0">
                  </div>   
                 <div class="d-flex justify-content-around mb-4 mt-2">
                    <button class="btn" onclick="prevSong()"><i class="fa-solid fa-backward-step"></i></button> 
                    <button class="btn" id="playpausebtn" onclick="playpause()"><i class="fa-solid fa-play"></i></button>
                    <button class="btn" onclick="nextSong()"><i class="fa-solid fa-forward-step" ></i></button>
                </div>
                <div class="d-flex justify-content-between my-4">
                  <button class="btn" onclick="repeatClick()" id="repeatBtn"><i class="fa-solid fa-repeat repeat-off"></i></button>
                   <button class="btn" onclick="shuffleClick()" id="shuffle"><i class="fa-solid fa-shuffle shuffle-off"></i></button>
                  <button class="btn" onclick="volumeClick()" id="volume"><i class="fa-solid fa-volume-high"></i></button>
                    <button onclick="heartClick()" class="btn">
  <i id="heartIcon" class="fa-regular fa-heart"></i>
</button>
                </div>
                 <i class="fa-solid fa-volume"></i>
                  </div>
                </div>                    
              </div>       
     </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
</body>
</html>
